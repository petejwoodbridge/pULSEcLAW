services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  ntfy:
    image: binwiederhier/ntfy:latest
    command: serve
    ports:
      - "8080:80"
    volumes:
      - ntfy:/var/cache/ntfy
    restart: unless-stopped

  pulse:
    build: .
    depends_on:
      - ollama
    env_file: .env
    environment:
      OLLAMA_HOST: http://ollama:11434
      NTFY_URL: http://ntfy:80
    ports:
      - "7878:7878"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    restart: unless-stopped

volumes:
  ollama:
  ntfy:
