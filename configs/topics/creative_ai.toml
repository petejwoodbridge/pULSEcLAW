[topic]
id = "creative_ai"
name = "Creative AI"
description = """
AI in film, games, music, visual arts, design, advertising, and creative tooling. Include: model releases in image/video/audio/3D, tooling and workflow discourse, artist perspectives on adoption and displacement, IP and legal friction, cross-industry adoption stories. Exclude: generic LLM benchmark chatter, enterprise AI sales news, breathless "AI will change everything" takes, VC-ecosystem gossip.
"""

[seeds.queries]
# Used for search-based sources (Twitter, HN search)
terms = [
  "ComfyUI",
  "Stable Diffusion",
  "Sora",
  "Flux",
  "SDXL",
  "Runway",
  "AI film",
  "AI music generation",
  "Suno",
  "Udio",
  "generative 3D",
  "AI game dev",
  "ControlNet",
  "AI VFX",
  "AI concept art",
]

